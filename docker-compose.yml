version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fastapi-issue-tracker
    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data

    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
